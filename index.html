<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saving is the mother of everything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9A227;
    --gold-glow: rgba(245,200,66,0.25);
    --btc: #F7931A;
    --bg: #0A0A0F;
    --surface: #111118;
    --surface2: #1A1A24;
    --border: rgba(245,200,66,0.15);
    --text: #F0EDE6;
    --text-muted: #8A8A9A;
    --success: #22C55E;
    --error: #EF4444;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
  }
  @keyframes gridMove { to { background-position: 40px 40px; } }

  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(245,200,66,0.08); top: -100px; right: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: rgba(247,147,26,0.06); bottom: -80px; left: -80px; animation-delay: 4s; }
  @keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px,-20px) scale(1.05); }
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 24px 16px;
  }

  /* Logo */
  .logo {
    text-align: center; margin-bottom: 40px;
    animation: fadeInDown 0.6s ease;
  }
  .logo-icon {
    width: 64px; height: 64px; margin: 0 auto 12px;
    background: linear-gradient(135deg, var(--gold), var(--btc));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 0 40px var(--gold-glow);
  }
  .logo h1 {
    font-family: 'Space Mono', monospace;
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--btc));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    backdrop-filter: blur(20px);
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: fadeInUp 0.6s ease 0.1s both;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: 10px; padding: 4px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    background: transparent; color: var(--text-muted);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #000; font-weight: 600;
  }

  /* Form */
  .form-group { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }

  input {
    width: 100%; padding: 13px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 15px; outline: none;
    transition: all 0.2s;
  }
  input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-glow);
  }
  input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border: none; border-radius: 10px;
    color: #000; font-family: 'Noto Sans Thai', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--gold-glow); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); margin-top: 8px;
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold); box-shadow: none; }

  /* Alert */
  .alert {
    padding: 12px 16px; border-radius: 10px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  .alert.show { display: block; animation: shake 0.3s ease; }
  .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #FCA5A5; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86EFAC; }

  .forgot-link {
    text-align: center; margin-top: 16px;
    font-size: 13px; color: var(--text-muted);
  }
  .forgot-link a { color: var(--gold); text-decoration: none; cursor: pointer; }
  .forgot-link a:hover { text-decoration: underline; }

  .divider {
    text-align: center; color: var(--text-muted); font-size: 12px;
    margin: 16px 0; position: relative;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 38%; height: 1px; background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* Panel visibility */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }

  /* Loading spinner */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000; border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 8px;
  }

  @keyframes fadeInDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }
  @keyframes spin { to { transform:rotate(360deg); } }

  .version { text-align:center; margin-top:20px; font-size:11px; color:var(--text-muted); opacity:0.5; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="container">
  <div class="logo">
    <div class="logo-icon" style="display:flex;align-items:center;justify-content:center;gap:6px;">
      <img src="https://cdn-icons-png.flaticon.com/512/5699/5699560.png" style="width:28px;height:28px;object-fit:contain;">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" style="width:28px;height:28px;object-fit:contain;">
    </div>
    <h1>SAVING IS THE<br>MOTHER OF EVERYTHING</h1>
    <p>บันทึกการออม ทอง & Bitcoin</p>
    <p style="font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);opacity:0.7;margin-top:6px;letter-spacing:1.5px;">" Stack Sats, stay humble. "</p>
  </div>

  <div class="card">
    <!-- LOGIN / REGISTER TABS -->
    <div id="authSection">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">เข้าสู่ระบบ</button>
        <button class="tab-btn" onclick="showTab('register')">สมัครสมาชิก</button>
      </div>

      <div id="alertBox" class="alert"></div>

      <!-- LOGIN -->
      <div id="loginPanel" class="panel active">
        <div class="form-group">
          <label>อีเมล</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน</label>
          <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
        <div class="forgot-link">
          <a onclick="showTab('reset')">ลืมรหัสผ่าน?</a>
        </div>
      </div>

      <!-- REGISTER -->
      <div id="registerPanel" class="panel">
        <div class="form-group">
          <label>ชื่อผู้ใช้</label>
          <input type="text" id="regName" placeholder="ชื่อของคุณ">
        </div>
        <div class="form-group">
          <label>อีเมล</label>
          <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
          <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn" id="registerBtn" onclick="handleRegister()">สมัครสมาชิก</button>
      </div>

      <!-- RESET PASSWORD -->
      <div id="resetPanel" class="panel">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">
          ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณ
        </p>
        <div class="form-group">
          <label>อีเมล</label>
          <input type="email" id="resetEmail" placeholder="you@example.com">
        </div>
        <button class="btn" id="resetBtn" onclick="handleReset()">ส่งลิงก์รีเซ็ต</button>
        <button class="btn btn-ghost" onclick="showTab('login')">← กลับเข้าสู่ระบบ</button>
      </div>
    </div>
  </div>

  <div class="version">Saving is the mother of everything · Powered by Supabase</div>
</div>

<script>
// ===== SUPABASE CONFIG =====
// 🔧 แก้ไข 2 ค่านี้หลังสร้าง Supabase project
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== TAB SWITCHER =====
function showTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  clearAlert();

  if (tab === 'login') {
    document.getElementById('loginPanel').classList.add('active');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
  } else if (tab === 'register') {
    document.getElementById('registerPanel').classList.add('active');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
  } else if (tab === 'reset') {
    document.getElementById('resetPanel').classList.add('active');
  }
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = `alert alert-${type} show`;
}
function clearAlert() {
  const el = document.getElementById('alertBox');
  el.className = 'alert';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>กรุณารอ...' : btn.getAttribute('data-label');
}

// Set default labels
['loginBtn','registerBtn','resetBtn'].forEach(id => {
  const el = document.getElementById(id);
  if(el) el.setAttribute('data-label', el.textContent);
});

// ===== AUTH HANDLERS =====
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showAlert('กรุณากรอกอีเมลและรหัสผ่าน');

  setLoading('loginBtn', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('loginBtn', false);

  if (error) return showAlert('เข้าสู่ระบบไม่สำเร็จ: ' + error.message);
  window.location.href = 'app.html';
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;

  if (!name || !email || !password) return showAlert('กรุณากรอกข้อมูลให้ครบ');
  if (password.length < 6) return showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');

  setLoading('registerBtn', true);
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  setLoading('registerBtn', false);

  if (error) return showAlert('สมัครไม่สำเร็จ: ' + error.message);
  showAlert('✅ สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี', 'success');
}

async function handleReset() {
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) return showAlert('กรุณากรอกอีเมล');

  setLoading('resetBtn', true);
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/app.html?reset=true'
  });
  setLoading('resetBtn', false);

  if (error) return showAlert('เกิดข้อผิดพลาด: ' + error.message);
  showAlert('✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลแล้ว กรุณาตรวจสอบกล่องจดหมาย', 'success');
}

// ===== ENTER KEY =====
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.panel.active');
  if (active?.id === 'loginPanel') handleLogin();
  else if (active?.id === 'registerPanel') handleRegister();
  else if (active?.id === 'resetPanel') handleReset();
});

// ===== AUTO REDIRECT IF LOGGED IN =====
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'app.html';
})();
</script>
</body>
</html>
