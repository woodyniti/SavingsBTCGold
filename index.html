<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saving is the mother of everything</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --gold: #B8860B; --gold-bg: #FFFBEB; --gold-border: #FDE68A;
  --bg: #F8F7F4; --surface: #FFFFFF; --surface2: #F3F2EF;
  --border: #E8E5DF; --border-strong: #D1CEC6;
  --text: #1A1916; --text-muted: #6B6860; --text-dim: #9C9A94;
  --success: #16A34A; --success-bg: #F0FDF4; --success-border: #BBF7D0;
  --error: #DC2626; --error-bg: #FEF2F2; --error-border: #FECACA;
  --radius: 16px; --radius-sm: 10px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.05);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans Thai',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px;
}
.container { width:100%; max-width:420px; }

.logo { text-align:center; margin-bottom:32px; animation:fadeInDown 0.5s ease; }
.logo-icon {
  width:72px; height:72px; margin:0 auto 14px;
  background:var(--gold-bg); border:2px solid var(--gold-border);
  border-radius:20px; display:flex; align-items:center; justify-content:center; gap:6px;
  box-shadow:0 4px 20px rgba(184,134,11,0.12);
}
.logo h1 {
  font-family:'IBM Plex Mono',monospace; font-size:15px; font-weight:600;
  color:var(--gold); letter-spacing:1px; line-height:1.5;
}
.logo-sub { font-size:14px; color:var(--text-muted); margin-top:6px; }
.logo-quote { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--gold); opacity:0.75; margin-top:8px; letter-spacing:1px; }

.card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--radius); padding:28px;
  box-shadow:var(--shadow); animation:fadeInUp 0.5s ease 0.05s both;
}

.tabs { display:flex; gap:4px; background:var(--surface2); border-radius:10px; padding:4px; margin-bottom:24px; }
.tab-btn {
  flex:1; padding:10px; border:none; border-radius:8px;
  background:transparent; color:var(--text-muted);
  font-family:'Noto Sans Thai',sans-serif; font-size:15px; cursor:pointer; transition:all 0.15s;
}
.tab-btn.active { background:var(--gold); color:#fff; font-weight:600; }

.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; color:var(--text-muted); font-weight:600; margin-bottom:8px; }
input[type="email"], input[type="password"], input[type="text"] {
  width:100%; padding:13px 16px;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:'Noto Sans Thai',sans-serif; font-size:15px; outline:none; transition:all 0.15s;
}
input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(184,134,11,0.1); }
input::placeholder { color:var(--text-dim); }

.btn {
  width:100%; padding:14px; background:var(--gold); border:none;
  border-radius:var(--radius-sm); color:#fff;
  font-family:'Noto Sans Thai',sans-serif; font-size:15px; font-weight:700;
  cursor:pointer; transition:all 0.15s; margin-top:6px;
}
.btn:hover { background:#9A7009; transform:translateY(-1px); box-shadow:0 4px 16px rgba(184,134,11,0.25); }
.btn:active { transform:translateY(0); }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
.btn-outline {
  background:var(--surface); border:1.5px solid var(--border-strong); color:var(--text-muted); margin-top:8px;
}
.btn-outline:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-bg); box-shadow:none; transform:none; }

.btn-google {
  width:100%; padding:13px 16px;
  background:var(--surface); border:1.5px solid var(--border-strong);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:'Noto Sans Thai',sans-serif; font-size:15px; font-weight:500;
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
  transition:all 0.15s; margin-bottom:4px;
}
.btn-google:hover { background:var(--surface2); box-shadow:0 2px 8px rgba(0,0,0,0.08); }
.btn-google img { width:20px; height:20px; }

.divider {
  text-align:center; color:var(--text-dim); font-size:13px; margin:16px 0; position:relative;
}
.divider::before, .divider::after {
  content:''; position:absolute; top:50%; width:40%; height:1px; background:var(--border);
}
.divider::before { left:0; } .divider::after { right:0; }

.alert { padding:13px 16px; border-radius:var(--radius-sm); font-size:14px; margin-bottom:16px; display:none; }
.alert.show { display:block; animation:shake 0.3s ease; }
.alert-error { background:var(--error-bg); border:1.5px solid var(--error-border); color:var(--error); }
.alert-success { background:var(--success-bg); border:1.5px solid var(--success-border); color:var(--success); }

.forgot-link { text-align:center; margin-top:16px; font-size:14px; color:var(--text-muted); }
.forgot-link a { color:var(--gold); text-decoration:none; cursor:pointer; font-weight:500; }
.forgot-link a:hover { text-decoration:underline; }

.panel { display:none; }
.panel.active { display:block; animation:fadeIn 0.2s ease; }

.spinner {
  width:16px; height:16px; border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite;
  display:inline-block; vertical-align:middle; margin-right:8px;
}

.version { text-align:center; margin-top:20px; font-size:12px; color:var(--text-dim); }

@keyframes fadeInDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <img src="https://cdn-icons-png.flaticon.com/512/5699/5699560.png" style="width:30px;height:30px;object-fit:contain;">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" style="width:30px;height:30px;object-fit:contain;">
    </div>
    <h1>SAVING IS THE<br>MOTHER OF EVERYTHING</h1>
    <p class="logo-sub">Web จดบันทึกการออมทอง / BTC</p>
    <p class="logo-quote">" Stack Sats, stay humble. "</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('login')">เข้าสู่ระบบ</button>
      <button class="tab-btn" onclick="showTab('register')">สมัครสมาชิก</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- LOGIN -->
    <div id="loginPanel" class="panel active">
      <button class="btn-google" onclick="handleGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        เข้าสู่ระบบด้วย Google
      </button>
      <div class="divider">หรือใช้อีเมล</div>
      <div class="form-group">
        <label>อีเมล</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ</button>
      <div class="forgot-link"><a onclick="showTab('reset')">ลืมรหัสผ่าน?</a></div>
    </div>

    <!-- REGISTER -->
    <div id="registerPanel" class="panel">
      <button class="btn-google" onclick="handleGoogle()">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
        สมัครด้วย Google
      </button>
      <div class="divider">หรือสมัครด้วยอีเมล</div>
      <div class="form-group">
        <label>ชื่อผู้ใช้</label>
        <input type="text" id="regName" placeholder="ชื่อของคุณ">
      </div>
      <div class="form-group">
        <label>อีเมล</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>รหัสผ่าน (อย่างน้อย 6 ตัว)</label>
        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn" id="registerBtn" onclick="handleRegister()">สมัครสมาชิก</button>
    </div>

    <!-- RESET PASSWORD -->
    <div id="resetPanel" class="panel">
      <p style="font-size:14px;color:var(--text-muted);margin-bottom:20px;line-height:1.6;">ระบบจะส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลของคุณ</p>
      <div class="form-group">
        <label>อีเมล</label>
        <input type="email" id="resetEmail" placeholder="you@example.com">
      </div>
      <button class="btn" id="resetBtn" onclick="handleReset()">ส่งลิงก์รีเซ็ต</button>
      <button class="btn btn-outline" onclick="showTab('login')">← กลับเข้าสู่ระบบ</button>
    </div>
  </div>

  <div class="version">Saving is the mother of everything · Powered by Supabase</div>
</div>

<script>
const SUPABASE_URL = 'https://oskhxtsdwsxscpkqwsbk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9za2h4dHNkd3N4c2Nwa3F3c2JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0NDY2NDksImV4cCI6MjA5MTAyMjY0OX0.TNJhIxkqvbOGK-uoaplxQkzlOrSFkkFPtdLMYToBmFM';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  clearAlert();
  if (tab === 'login') { document.getElementById('loginPanel').classList.add('active'); document.querySelectorAll('.tab-btn')[0].classList.add('active'); }
  else if (tab === 'register') { document.getElementById('registerPanel').classList.add('active'); document.querySelectorAll('.tab-btn')[1].classList.add('active'); }
  else { document.getElementById('resetPanel').classList.add('active'); }
}
function showAlert(msg, type='error') { const el=document.getElementById('alertBox'); el.textContent=msg; el.className=`alert alert-${type} show`; }
function clearAlert() { document.getElementById('alertBox').className='alert'; }
function setLoading(id, on, label) { const b=document.getElementById(id); b.disabled=on; b.innerHTML=on?'<span class="spinner"></span>กรุณารอ...':label; }

async function handleGoogle() {
  const { error } = await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo:'https://woodyniti.github.io/SavingsBTCGold/app.html' } });
  if (error) showAlert('Google login ไม่สำเร็จ: ' + error.message);
}
async function handleLogin() {
  const email=document.getElementById('loginEmail').value.trim(), password=document.getElementById('loginPassword').value;
  if (!email||!password) return showAlert('กรุณากรอกอีเมลและรหัสผ่าน');
  setLoading('loginBtn',true,'เข้าสู่ระบบ');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading('loginBtn',false,'เข้าสู่ระบบ');
  if (error) return showAlert('เข้าสู่ระบบไม่สำเร็จ: ' + error.message);
  window.location.href = 'app.html';
}
async function handleRegister() {
  const name=document.getElementById('regName').value.trim(), email=document.getElementById('regEmail').value.trim(), password=document.getElementById('regPassword').value;
  if (!name||!email||!password) return showAlert('กรุณากรอกข้อมูลให้ครบ');
  if (password.length<6) return showAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร');
  setLoading('registerBtn',true,'สมัครสมาชิก');
  const { error } = await sb.auth.signUp({ email, password, options:{ data:{ full_name:name } } });
  setLoading('registerBtn',false,'สมัครสมาชิก');
  if (error) return showAlert('สมัครไม่สำเร็จ: ' + error.message);
  showAlert('✅ สมัครสำเร็จ! กรุณาตรวจสอบอีเมลเพื่อยืนยันบัญชี','success');
}
async function handleReset() {
  const email=document.getElementById('resetEmail').value.trim();
  if (!email) return showAlert('กรุณากรอกอีเมล');
  setLoading('resetBtn',true,'ส่งลิงก์รีเซ็ต');
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo:'https://woodyniti.github.io/SavingsBTCGold/app.html?reset=true' });
  setLoading('resetBtn',false,'ส่งลิงก์รีเซ็ต');
  if (error) return showAlert('เกิดข้อผิดพลาด: ' + error.message);
  showAlert('✅ ส่งลิงก์รีเซ็ตรหัสผ่านไปยังอีเมลแล้ว','success');
}
document.addEventListener('keydown', e => {
  if (e.key!=='Enter') return;
  const a=document.querySelector('.panel.active');
  if (a?.id==='loginPanel') handleLogin();
  else if (a?.id==='registerPanel') handleRegister();
  else if (a?.id==='resetPanel') handleReset();
});
(async () => { const { data:{ session } } = await sb.auth.getSession(); if (session) window.location.href='app.html'; })();
</script>
</body>
</html>
